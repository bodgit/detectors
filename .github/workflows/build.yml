---
name: Build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  golang-checks:
    strategy:
      fail-fast: false
      matrix:
        module:
          - aws/eks
          - container
    name: Golang checks
    uses: bodgit/workflows/.github/workflows/golang-checks.yml@90676a57fa5e7bb53dbea051211751b225ee60ca # v1.0.1
    with:
      working_directory: ${{ matrix.module }}
